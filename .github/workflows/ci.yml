name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      JWT_SECRET: ci-test-jwt-secret-with-32-chars-minimum
      MONGO_URI: mongodb://127.0.0.1:27017/ecommerce_ci
      E2E_MONGO_URI: mongodb://127.0.0.1:27017/ecommerce_e2e_ci
      NODE_ENV: test
      PLATFORM_COMMISSION_RATE: '0.10'
      FRONTEND_URL: http://localhost:3000
      API_BASE_URL: http://127.0.0.1:8080
      SMTP_PASS: re_ci_fake_key
      SMTP_FROM: ci@test.local
      IYZIPAY_API_KEY: sandbox-ci-key
      IYZIPAY_SECRET_KEY: sandbox-ci-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run check:imports

      - run: npm test

      - run: npm run build

      - run: npm run test:e2e
