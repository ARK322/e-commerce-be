# Faz 1+ yerel geliştirme topolojisi.
# Tek kod tabanı, SERVICE_ROLE ile farklı process rolleri.
# Broker (RabbitMQ) ve Redis Faz 1/Faz 2 için hazır bekletiliyor.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--save', '60', '1']
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: api
      PORT: '3000'
      MONGO_URI: mongodb://mongo:27017/ecommerce
      REDIS_URL: redis://redis:6379
      QUEUE_URL: amqp://app:app@rabbitmq:5672
      CATALOG_CACHE_BACKEND: redis
      # Faz 3 — RS256: api/identity private+public key, diğer servisler sadece public.
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt-public.pem
      # Faz 3/Aşama 3 — gateway güven sınırı: imzalı X-User-* header'larına güven.
      GATEWAY_SIGNING_SECRET: local-gateway-trust-secret-change-me
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - '3000:3000'
    depends_on:
      - mongo
      - redis
      - rabbitmq

  # Taşınmış mikroservis: yalnızca public catalog rotalarını serve eder.
  catalog:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: catalog
      PORT: '3000'
      MONGO_URI: mongodb://mongo:27017/ecommerce
      REDIS_URL: redis://redis:6379
      CATALOG_CACHE_BACKEND: redis
      # Catalog yalnızca public key'e sahip (asimetrik doğrulama modeli).
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt-public.pem
      GATEWAY_SIGNING_SECRET: local-gateway-trust-secret-change-me
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - mongo
      - redis

  # Strangler-Fig reverse proxy: RS256 verify + imzalı header + routing.
  gateway:
    build:
      context: .
      target: gateway
    restart: unless-stopped
    environment:
      GATEWAY_PORT: '8080'
      LOG_LEVEL: info
      GATEWAY_SIGNING_SECRET: local-gateway-trust-secret-change-me
      GATEWAY_MONOLITH_UPSTREAM: http://api:3000
      GATEWAY_CATALOG_UPSTREAM: http://catalog:3000
      GATEWAY_IDENTITY_UPSTREAM: http://api:3000
      # Dağıtık revocation kontrolü için Redis (edge'de ban/iptal eler).
      REDIS_URL: redis://redis:6379
      # Gateway yalnızca public key ile token doğrular (private key YOK).
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt-public.pem
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - '8080:8080'
    depends_on:
      - api
      - catalog
      - redis

  notification-worker:
    build:
      context: .
      target: notification-worker
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: notification-worker
      MONGO_URI: mongodb://mongo:27017/ecommerce
      QUEUE_URL: amqp://app:app@rabbitmq:5672
    depends_on:
      - mongo
      - rabbitmq

  payments-worker:
    build:
      context: .
      target: payments-worker
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: payments-worker
      MONGO_URI: mongodb://mongo:27017/ecommerce
      QUEUE_URL: amqp://app:app@rabbitmq:5672
    depends_on:
      - mongo
      - rabbitmq

volumes:
  mongo-data:
  redis-data:
