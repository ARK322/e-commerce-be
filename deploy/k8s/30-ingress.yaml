# Strangler Fig: public catalog trafi\u011fi catalog servisine, geri kalan her \u015fey api'ye.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce
  namespace: ecommerce
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /categories
            pathType: Prefix
            backend:
              service: { name: catalog, port: { number: 80 } }
          - path: /products
            pathType: Prefix
            backend:
              service: { name: catalog, port: { number: 80 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: api, port: { number: 80 } }
