# API pod'u — HTTP serve eder, scheduler \u00e7al\u0131\u015ft\u0131rmaz (worker'lar sahiplenir).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ecommerce-be:latest
          command: ['node', 'dist/app/server.js']
          env:
            - { name: SERVICE_ROLE, value: 'api' }
          envFrom:
            - configMapRef: { name: ecommerce-config }
            - secretRef: { name: ecommerce-secrets }
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /ready, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ecommerce
spec:
  selector: { app: api }
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: ecommerce
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
